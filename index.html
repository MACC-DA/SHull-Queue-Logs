<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHull Queue - Professional Log Manager</title>

  <style>
    body { font-family: 'Segoe UI', sans-serif; background:#f4f7f6; display:flex; justify-content:center; padding:20px; }
    .container { background:#fff; padding:2rem; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,.1); width:100%; max-width:1150px; }
    h2 { text-align:center; border-bottom:3px solid #1a73e8; padding-bottom:10px; }
    .input-group { display:flex; gap:10px; margin-bottom:20px; }
    input { flex:1; padding:12px; border-radius:8px; border:2px solid #ddd; }
    button { border:none; border-radius:8px; cursor:pointer; font-weight:bold; padding:10px 20px; }
    .add-btn{ background:#1a73e8; color:#fff; }
    table{ width:100%; border-collapse:collapse; }
    th,td{ padding:12px; text-align:center; border-bottom:1px solid #eee; }
    th{ background:#f8f9fa; font-size:.75rem; text-transform:uppercase; }
    .status-pill{ padding:6px 12px; border-radius:20px; font-size:.8rem; font-weight:bold; }
    .waiting{ background:#eee; }
    .ongoing{ background:#e3f2fd; color:#1565c0; }
    .done{ background:#e8f5e9; color:#2e7d32; }
    .btn-group{ display:flex; gap:6px; justify-content:center; }
    .action-btn{ padding:6px 10px; font-size:.75rem; border-radius:4px; color:#fff; }
    .btn-og{ background:#17a2b8; }
    .btn-done{ background:#28a745; }
    .btn-delete{ background:#dc3545; }
    .hidden{ display:none; }
  </style>

  <!-- ✅ SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
    const SUPABASE_KEY = "YOUR_PUBLIC_ANON_KEY";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  </script>
</head>

<body>
<div class="container">
  <h2>SHull Queue Controller</h2>

  <div class="input-group">
    <input id="nameInput" placeholder="Enter Client or Task Name..." />
    <button class="add-btn" onclick="addToQueue()">Add</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="queueBody"></tbody>
  </table>
</div>

<script>
async function loadFromDB() {
  const { data } = await supabase.from("queue").select().order("created_at");
  queueBody.innerHTML = "";
  data.forEach(r => createRow(r));
}

function createRow(item) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="row-name">${item.name}</td>
    <td>${item.start_time || "--"}</td>
    <td>${item.end_time || "--"}</td>
    <td><span class="status-pill ${item.status.toLowerCase().replace("-", "")}">${item.status}</span></td>
    <td>
      <div class="btn-group">
        <button class="action-btn btn-og" onclick="setOngoing('${item.name}')">On</button>
        <button class="action-btn btn-done" onclick="setDone('${item.name}')">Done</button>
        <button class="action-btn btn-delete" onclick="deleteRow('${item.name}')">X</button>
      </div>
    </td>
  `;
  queueBody.appendChild(tr);
}

async function addToQueue() {
  const name = nameInput.value.trim();
  if (!name) return;

  await supabase.from("queue").insert([{ name, status: "Waiting" }]);
  nameInput.value = "";
  loadFromDB();
}

async function setOngoing(name) {
  await supabase.from("queue").update({
    status: "On-going",
    start_time: new Date().toLocaleTimeString()
  }).eq("name", name);
  loadFromDB();
}

async function setDone(name) {
  await supabase.from("queue").update({
    status: "Done",
    end_time: new Date().toLocaleTimeString()
  }).eq("name", name);
  loadFromDB();
}

async function deleteRow(name) {
  if (!confirm("Delete?")) return;
  await supabase.from("queue").delete().eq("name", name);
  loadFromDB();
}

window.onload = loadFromDB;
</script>
</body>
</html>
