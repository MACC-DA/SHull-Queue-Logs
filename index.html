<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHull Queue - Professional Log Manager</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background:#f4f7f6;
  display:flex;
  justify-content:center;
  padding:20px;
}
.container {
  background:white;
  padding:2rem;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  width:100%;
  max-width:1150px;
}
h2 {
  text-align:center;
  border-bottom:3px solid #1a73e8;
  padding-bottom:10px;
  margin-bottom:20px;
}

.auth-box {
  background:#f8f9fa;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

.input-group {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:2px solid #ddd;
}
.add-btn {
  background:#1a73e8;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px 25px;
  font-weight:bold;
  cursor:pointer;
}
table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  padding:14px;
  text-align:center;
  border-bottom:1px solid #eee;
}
th {
  background:#f8f9fa;
  font-size:.75rem;
  text-transform:uppercase;
}
.status-pill {
  padding:6px 12px;
  border-radius:20px;
  font-size:.8rem;
  font-weight:bold;
}
.waiting { background:#eee; color:#666; }
.ongoing { background:#e3f2fd; color:#1565c0; border:1px solid #1565c0; }
.done { background:#e8f5e9; color:#2e7d32; }

.btn-group {
  display:flex;
  gap:6px;
  justify-content:center;
}
.action-btn {
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:.75rem;
  font-weight:bold;
  color:white;
}
.btn-og { background:#17a2b8; }
.btn-done { background:#28a745; }
.btn-pass { background:#6c757d; }
.btn-delete { background:#dc3545; }

.time-text, .result-text {
  font-family:monospace;
  font-weight:bold;
}

.hidden { display:none; }
</style>

<!-- ✅ SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://dpozdmlfmyqikesgjiur.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwb3pkbWxmbXlxaWtlc2dqaXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjQ2NjYsImV4cCI6MjA5MTYwMDY2Nn0.a60aUUFBP-4HaGKKxfwpRJKk73Z8WNJX_N_G3SMuJso";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);
</script>
</head>

<body>
<div class="container">

  <!-- ✅ AUTH UI -->
  <div class="auth-box">
    <h3>Team Login</h3>
    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Password">

    <button onclick="registerUser()">Create Account</button>
    <button onclick="loginUser()">Login</button>
    <button onclick="logoutUser()" id="logoutBtn" class="hidden">Logout</button>

    <p id="authStatus"></p>
  </div>

  <!-- ✅ QUEUE UI -->
  <h2>SHull Queue Controller</h2>

  <div class="input-group">
    <input id="nameInput" placeholder="SmartHULL User">
    <button class="add-btn" onclick="addToQueue()">Add to Queue</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
        <th>Remarks</th>
        <th>Time Consumed</th>
      </tr>
    </thead>
    <tbody id="queueBody"></tbody>
  </table>
</div>

<script>
let currentUser = null;
let queueBody, nameInput, currentData = [];

/* ✅ AUTH FUNCTIONS */
async function registerUser() {
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  const { error } = await supabaseClient.auth.signUp({ email, password });
  authStatus.innerText = error ? error.message : "Account created. Please login.";
}

async function loginUser() {
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) return authStatus.innerText = error.message;
  currentUser = data.user;
  authStatus.innerText = `Logged in as ${currentUser.email}`;
  logoutBtn.classList.remove("hidden");
}

async function logoutUser() {
  await supabaseClient.auth.signOut();
  currentUser = null;
  authStatus.innerText = "Logged out";
  logoutBtn.classList.add("hidden");
}

/* ✅ SESSION RESTORE */
supabaseClient.auth.getSession().then(({ data }) => {
  if (data.session) {
    currentUser = data.session.user;
    authStatus.innerText = `Logged in as ${currentUser.email}`;
    logoutBtn.classList.remove("hidden");
  }
});

window.onload = () => {
  queueBody = document.getElementById("queueBody");
  nameInput = document.getElementById("nameInput");

  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") addToQueue();
  });

  loadFromDB();
  setInterval(loadFromDB, 30000);
};

/* ✅ QUEUE PROTECTED BY LOGIN */
async function addToQueue() {
  if (!currentUser) return alert("Please log in first.");

  const name = nameInput.value.trim();
  if(!name) return;

  await supabaseClient.from("queue").insert([{
    name,
    status:"Waiting",
    sort_order:Date.now(),
    created_by: currentUser.email
  }]);

  nameInput.value="";
  loadFromDB();
}

async function loadFromDB() {
  const { data } = await supabaseClient.from("queue")
    .select("*")
    .order("sort_order");

  if(!Array.isArray(data)) return;
  currentData = data;
  queueBody.innerHTML="";
  data.forEach(row => {
    queueBody.innerHTML += `
      <tr>
        <td>${row.name}</td>
        <td>${row.start_time ?? "--"}</td>
        <td>${row.end_time ?? "--"}</td>
        <td><span class="status-pill ${row.status.toLowerCase()}">${row.status}</span></td>
        <td>—</td>
        <td>${row.time_consumed ?? "--"}</td>
      </tr>`;
  });
}
</script>
</body>
</html>
