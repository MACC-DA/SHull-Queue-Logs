<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHull Queue - Shared Log Manager</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f7f6;
  display: flex;
  justify-content: center;
  padding: 20px;
}
.container {
  background: white;
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 1100px;
}
h2 {
  text-align: center;
  border-bottom: 3px solid #1a73e8;
  padding-bottom: 10px;
}
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 2px solid #ddd;
}
button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
.add-btn { background: #1a73e8; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #eee;
}
th {
  background: #f8f9fa;
  font-size: 0.75rem;
  text-transform: uppercase;
}
.status-pill {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: bold;
}
.waiting { background: #eee; }
.ongoing { background: #e3f2fd; color: #1565c0; }
.done { background: #e8f5e9; color: #2e7d32; }

.btn-group {
  display: flex;
  gap: 6px;
  justify-content: center;
}
.action-btn {
  padding: 6px 10px;
  font-size: 0.75rem;
  border-radius: 4px;
  color: white;
}
.btn-og { background: #17a2b8; }
.btn-done { background: #28a745; }
.btn-delete { background: #dc3545; }
</style>

<!-- ✅ SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://dpozdmlfmyqikesgjiur.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwb3pkbWxmbXlxaWtlc2dqaXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjQ2NjYsImV4cCI6MjA5MTYwMDY2Nn0.a60aUUFBP-4HaGKKxfwpRJKk73Z8WNJX_N_G3SMuJso";

  const { createClient } = window.supabase;
  const supabaseClient = createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );
</script>
</head>

<body>
<div class="container">
  <h2>SHull Queue Controller</h2>

  <div class="input-group">
    <input id="nameInput" placeholder="Enter Client or Task Name">
    <button class="add-btn" onclick="addToQueue()">Add to Queue</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="queueBody"></tbody>
  </table>
</div>

<script>
let queueBody, nameInput;

window.onload = () => {
  queueBody = document.getElementById("queueBody");
  nameInput = document.getElementById("nameInput");

  loadFromDB();

  // ✅ Auto-refresh every 30 seconds
  setInterval(() => {
    loadFromDB();
    console.log("Auto-refresh at", new Date().toLocaleTimeString());
  }, 30000);
};

async function loadFromDB() {
  const { data, error } = await supabaseClient
    .from("queue")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  queueBody.innerHTML = "";
  data.forEach(row => createRow(row));
}

function createRow(item) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${item.name}</td>
    <td>${item.start_time ?? "--"}</td>
    <td>${item.end_time ?? "--"}</td>
    <td>
      <span class="status-pill ${item.status.toLowerCase().replace("-", "")}">
        ${item.status}
      </span>
    </td>
    <td>
      <div class="btn-group">
        <button class="action-btn btn-og" onclick="setOngoing('${item.name}')">On</button>
        <button class="action-btn btn-done" onclick="setDone('${item.name}')">Done</button>
        <button class="action-btn btn-delete" onclick="deleteRow('${item.name}')">X</button>
      </div>
    </td>
  `;
  queueBody.appendChild(tr);
}

async function addToQueue() {
  const name = nameInput.value.trim();
  if (!name) return;

  const { error } = await supabaseClient
    .from("queue")
    .insert([{ name, status: "Waiting" }]);

  if (error) {
    alert(error.message);
    return;
  }

  nameInput.value = "";
  loadFromDB();
}

async function setOngoing(name) {
  await supabaseClient.from("queue").update({
    status: "On-going",
    start_time: new Date().toLocaleTimeString()
  }).eq("name", name);

  loadFromDB();
}

async function setDone(name) {
  await supabaseClient.from("queue").update({
    status: "Done",
    end_time: new Date().toLocaleTimeString()
  }).eq("name", name);

  loadFromDB();
}

async function deleteRow(name) {
  if (!confirm("Delete this record?")) return;

  await supabaseClient.from("queue")
    .delete()
    .eq("name", name);

  loadFromDB();
}
</script>
</body>
</html>
